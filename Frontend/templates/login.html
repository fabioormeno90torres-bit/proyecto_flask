<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Web UNFV</title>
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .error-alert {
            color: #721c24;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <div id="error-message" class="error-alert"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Usuario:</label>
                <input type="text" id="username" required placeholder="Ej: admin">
            </div>
            <div class="form-group">
                <label>Contraseña:</label>
                <input type="password" id="password" required placeholder="••••">
            </div>
            <button type="submit">Ingresar al Sistema</button>
        </form>
    </div>

    <script>
        // CONFIGURACIÓN: Coloca aquí la URL que te dé Render al desplegar tu app.py
        const BACKEND_URL = "https://flask-proyecto-1.onrender.com"; 

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');

            errorDiv.style.display = 'none';

            try {
                const response = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    // Guardamos la sesión simulada en el navegador
                    localStorage.setItem('session_token', 'true');
                    localStorage.setItem('user_name', result.data.nombre);
                    
                    // Redirección directa a la pantalla principal en Vercel
                    window.location.href = 'principal.html';
                } else {
                    errorDiv.innerText = result.message || 'Error de credenciales';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = 'No se pudo conectar con el servidor de Render.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
